<!-- begin footer -->
<footer class="footer">
  <div class="container">
    <div class="row">
      <div class="col col-12">

        <div class="footer__inner" style="display: flex; justify-content: space-between; align-items: flex-start; padding: 60px 0 40px;">
          
          <!-- Left: Bio -->
          <div style="max-width: 500px;">
            <h3 style="font-size: 1.4rem; margin-bottom: 12px;">{{ .Site.Title }}</h3>
            <p style="line-height: 1.7; margin-bottom: 20px;">{{ .Site.Params.description }}</p>

            <!-- Social Icons -->
            <div style="display: flex; gap: 12px;">
              <a href="https://www.linkedin.com/in/triumph-kerins/" target="_blank" rel="noopener" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: #f5f5f5; border-radius: 10px; text-decoration: none; color: #1a1a2e;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              </a>
              <a href="#" target="_blank" rel="noopener" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: #f5f5f5; border-radius: 10px; text-decoration: none; color: #1a1a2e;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>
              </a>
            </div>
          </div>

          <!-- Right: Navigation -->
          <div>
            <h3 style="font-size: 1.4rem; margin-bottom: 12px;">Navigation</h3>
            <ul class="list-reset" style="columns: 2; column-gap: 40px;">
              {{ range .Site.Menus.main }}
              <li style="margin-bottom: 10px;">
                <a href="{{ .URL }}" style="text-decoration: none;">{{ .Name }}</a>
              </li>
              {{ end }}
            </ul>
          </div>

        </div>

        <div class="footer__info" style="border-top: 1px solid #eee; padding-top: 20px;">
          <div class="copyright">{{ dateFormat "2006" now }} &copy; <a href="/">{{ .Site.Title }}</a>. All Rights Reserved.</div>
        </div>

      </div>
    </div>
  </div>
</footer>
<!-- end footer -->
