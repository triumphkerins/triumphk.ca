{{ define "main" }}

<div class="container">
  <div class="row">
    <div class="col col-12">
      <div class="page__info">
        <h1 class="page__title">{{ .Title }}</h1>
      </div>
    </div>
  </div>
</div>

<!-- begin page -->
<div class="container animate">

  {{ if .Params.image }}
  <div class="row">
    <div class="col col-12">
      <div class="page-image">
        <img class="lazy" data-src="{{ .Params.Image | absURL }}" alt="{{ .Title }}">
      </div>
    </div>
  </div>
  {{ end }}

  <article class="page">
    <div class="page__content">
      {{ .Content }}
    </div>
  </article>

</div>
<!-- end page -->

{{ end }}
